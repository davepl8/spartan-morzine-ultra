<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniwersalny Kalkulator Tempa Ultra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght=400;700&family=Roboto:wght=400;500;700&display=swap');

        :root { 
            --spartan-purple: #6a1b9a;
            --spartan-purple-light: #9c4dcc;
            --bg-dark: #0f0f12; 
            --card-bg: #1c1b22; 
            --input-bg: #2b2a33;
            --text-light: #ffffff; 
            --text-muted: #a3a3a3;
            --gold: #d4af37; 
            --safe-green: #00e676;
            --danger-red: #ff1744;
            --warning-orange: #ff9100;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1525 100%); 
            color: var(--text-light); 
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
        }

        .container { 
            max-width: 600px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            border: 2px solid rgba(106, 27, 154, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 15px rgba(106, 27, 154, 0.2); 
        }

        .header-area { text-align: center; margin-bottom: 25px; }
        h2 { font-family: 'Oswald', sans-serif; font-size: 2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .sub-header { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 2px; }
        
        .section { 
            background: rgba(255,255,255,0.02); 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .section-title { 
            font-family: 'Oswald', sans-serif; font-size: 1rem; color: var(--spartan-purple-light); text-transform: uppercase; margin-bottom: 12px; font-weight: 700; letter-spacing: 1px;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
        .flex-pace { display: flex; gap: 8px; align-items: center; }
        
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 500; }
        input, select { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: var(--input-bg); color: var(--text-light); font-size: 1rem; font-weight: bold; box-sizing: border-box; 
        }
        input:focus, select:focus { border-color: var(--spartan-purple-light); outline: none; }
        
        .radio-group { display: flex; gap: 20px; margin-bottom: 5px; }
        .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.95rem; }
        .radio-label input { width: auto; accent-color: var(--spartan-purple-light); }

        .accordion-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .accordion-icon { font-size: 1.2rem; transition: transform 0.3s ease; color: var(--gold); }
        .accordion-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .accordion-content.open { display: block; }

        .cutoff-edit-row { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--text-muted); position: relative;}
        
        .btn { font-family: 'Oswald', sans-serif; background: var(--spartan-purple); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: var(--spartan-purple-light); }
        .btn-secondary { background: #444; margin-top: 0; padding: 10px; }
        .btn-secondary:hover { background: #555; }
        .btn-danger { background: var(--danger-red); padding: 4px 8px; font-size: 0.8rem; margin-top: 4px;}
        .btn-danger:hover { background: #ff5252; }
        .btn-profile-danger { background: var(--danger-red); font-family: 'Oswald', sans-serif; text-transform: uppercase; font-weight: bold; padding: 10px; border-radius: 8px; border: none; color: #fff; cursor: pointer; }

        .card-row { background: #22212a; padding: 16px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--spartan-purple); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-family: 'Oswald', sans-serif; font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
        .card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .card-details b { color: var(--text-light); }
        .pace-input-cell { margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
        
        .pitstop-box { background: rgba(212, 175, 55, 0.04); border: 1px dashed var(--gold); padding: 16px; border-radius: 12px; margin-bottom: 15px; }
        .pitstop-flex { display: flex; align-items: center; gap: 15px; }

        .safe { color: var(--safe-green); }
        .danger { color: var(--danger-red); }
        .passed { color: var(--warning-orange); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>Kalkulator Ultra</h2>
        <div class="sub-header">Wielozadaniowy Planer Biegów</div>
    </div>
    
    <div class="section" style="border: 1px solid var(--gold); background: rgba(214, 175, 55, 0.02);">
        <div class="section-title" style="color: var(--gold);">🏃 Wybór i zapis biegu</div>
        <div style="margin-bottom: 12px;">
            <label for="profile-select">Wybierz zapisany bieg:</label>
            <div style="display: flex; gap: 8px;">
                <select id="profile-select" onchange="loadProfile(this.value)"></select>
                <button class="btn-profile-danger" onclick="deleteCurrentProfile()">Usuń</button>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(212,175,55,0.2); margin: 15px 0;">
        <div>
            <label for="new-profile-name">Zapisz aktualny układ jako nowy bieg:</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-profile-name" placeholder="np. Runmageddon Myślenice">
                <button class="btn btn-secondary" onclick="saveAsNewProfile()">Zapisz</button>
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Ustawienia główne</div>
        <div class="grid-2">
            <div>
                <label for="start-time">Godzina startu</label>
                <input type="time" id="start-time" value="07:50">
            </div>
            <div>
                <label for="extra-dist">Dodatkowy dystans (%)</label>
                <input type="number" id="extra-dist" value="10" min="0" max="50">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🔧 Logistyka przepaku</div>
        <div style="margin-bottom: 12px;">
            <label class="radio-label">
                <input type="checkbox" id="global-pitstop-toggle" checked> Włącz przepak na trasie
            </label>
        </div>
        <div id="global-pitstop-config" class="grid-3">
            <div>
                <label for="pitstop-target">Po którym punkcie?</label>
                <select id="pitstop-target"></select>
            </div>
            <div>
                <label for="global-pitstop-time">Czas przerwy</label>
                <div class="flex-pace">
                    <input type="number" id="global-pitstop-time" value="15" min="0">
                    <span style="font-size: 0.85rem; color: var(--text-muted)">min</span>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Strategia tempa</div>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="pace-strategy" value="flat" checked> Stałe tempo
            </label>
            <label class="radio-label">
                <input type="radio" name="pace-strategy" value="split"> Różne tempo
            </label>
        </div>
        
        <div id="global-pace-container" class="pace-input-cell">
            <label>Twoje stałe tempo (min:sek / km)</label>
            <div class="flex-pace">
                <input type="number" id="global-min" value="12" min="0">
                <span style="font-weight: bold; color: var(--spartan-purple-light)">:</span>
                <input type="number" id="global-sec" value="00" min="0" max="59">
            </div>
        </div>
    </div>

    <div class="section" id="editor-section">
        <div class="accordion-header" onclick="toggleEditor()">
            <div class="section-title" style="margin: 0;">🛠️ Edytuj punkty kontrolne & limity</div>
            <div class="accordion-icon" id="acc-icon">▶</div>
        </div>
        <div class="accordion-content" id="acc-content">
            <div id="cutoffs-editor-list"></div>
            <button class="btn" onclick="addCutoffRow()">+ Dodaj kolejny punkt</button>
        </div>
    </div>

    <div class="section-title" style="margin-bottom: 15px;">Prognoza i Plan Biegu</div>
    <div id="route-results"></div>
</div>

<script>
    // Konfiguracja bazowa (Morzine)
    const defaultData = [
        { km: 32.0, time: "17:00", gain: 2273, loss: 2273 },
        { km: 37.8, time: "18:30", gain: 617, loss: 257 },
        { km: 41.3, time: "19:30", gain: 360, loss: 43 },
        { km: 46.3, time: "21:00", gain: 137, loss: 744 },
        { km: 52.0, time: "22:30", gain: 43, loss: 103 }
    ];

    // Główny obiekt profili
    let profiles = JSON.parse(localStorage.getItem('ultra_profiles')) || {
        "Spartan Ultra Morzine 2026": {
            cutoffsData: [...defaultData],
            splitPaces: {},
            hasPitstop: true,
            pitstopDuration: 15,
            pitstopTargetIndex: 0
        }
    };

    let currentProfileName = localStorage.getItem('ultra_current_profile_name') || Object.keys(profiles)[0];

    // Aktywne zmienne robocze
    let cutoffsData = [];
    let splitPaces = {};
    let hasPitstop = true;
    let pitstopDuration = 15;
    let pitstopTargetIndex = 0;

    function initProfiles() {
        if (!profiles[currentProfileName]) {
            currentProfileName = Object.keys(profiles)[0];
        }
        loadProfileData(currentProfileName);
        renderProfileSelect();
    }

    function loadProfileData(name) {
        const p = profiles[name];
        cutoffsData = JSON.parse(JSON.stringify(p.cutoffsData));
        splitPaces = JSON.parse(JSON.stringify(p.splitPaces || {}));
        hasPitstop = p.hasPitstop !== false;
        pitstopDuration = p.pitstopDuration || 15;
        pitstopTargetIndex = p.pitstopTargetIndex || 0;
        
        // Wymuszenie fizycznej aktualizacji elementów UI formularza głównego
        document.getElementById('global-pitstop-toggle').checked = hasPitstop;
        document.getElementById('global-pitstop-time').value = pitstopDuration;
    }

    function renderProfileSelect() {
        const select = document.getElementById('profile-select');
        select.innerHTML = '';
        Object.keys(profiles).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            if (name === currentProfileName) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function loadProfile(name) {
        currentProfileName = name;
        localStorage.setItem('ultra_current_profile_name', name);
        loadProfileData(name);
        
        // Kluczowa poprawka: po zmianie profilu, budujemy od nowa select opcji przepaku dla nowej trasy
        updatePitstopSelectOptions(); 
        renderEditor();
        renderRoute();
    }

    function saveActiveProfileState() {
        profiles[currentProfileName] = {
            cutoffsData: cutoffsData,
            splitPaces: splitPaces,
            hasPitstop: hasPitstop,
            pitstopDuration: pitstopDuration,
            pitstopTargetIndex: pitstopTargetIndex
        };
        localStorage.setItem('ultra_profiles', JSON.stringify(profiles));
    }

    function saveAsNewProfile() {
        const input = document.getElementById('new-profile-name');
        const name = input.value.trim();
        if (!name) {
            alert('Wpisz poprawną nazwę biegu!');
            return;
        }
        
        // Zapisujemy obecny stan pod nowym kluczem klonując zmienne robocze
        profiles[name] = {
            cutoffsData: JSON.parse(JSON.stringify(cutoffsData)),
            splitPaces: JSON.parse(JSON.stringify(splitPaces)),
            hasPitstop: hasPitstop,
            pitstopDuration: pitstopDuration,
            pitstopTargetIndex: pitstopTargetIndex
        };
        
        currentProfileName = name;
        localStorage.setItem('ultra_current_profile_name', name);
        localStorage.setItem('ultra_profiles', JSON.stringify(profiles));
        
        renderProfileSelect();
        input.value = '';
        loadProfile(name);
        alert(`Pomyślnie zapisano bieg: "${name}"`);
    }

    function deleteCurrentProfile() {
        const keys = Object.keys(profiles);
        if (keys.length <= 1) {
            alert('Musisz mieć zapisany przynajmniej jeden bieg na liście!');
            return;
        }
        if (confirm(`Czy na pewno chcesz bezpowrotnie usunąć bieg "${currentProfileName}"?`)) {
            delete profiles[currentProfileName];
            currentProfileName = Object.keys(profiles)[0];
            localStorage.setItem('ultra_current_profile_name', currentProfileName);
            localStorage.setItem('ultra_profiles', JSON.stringify(profiles));
            initProfiles();
            updatePitstopSelectOptions();
            renderEditor();
            renderRoute();
        }
    }

    function toggleEditor() {
        const content = document.getElementById('acc-content');
        const icon = document.getElementById('acc-icon');
        const isOpen = content.classList.contains('open');
        if (isOpen) {
            content.classList.remove('open');
            icon.style.transform = 'rotate(0deg)';
        } else {
            content.classList.add('open');
            icon.style.transform = 'rotate(90deg)';
        }
    }

    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function minutesToTimeStr(totalMinutes) {
        const h = Math.floor(totalMinutes / 60) % 24;
        const m = Math.floor(totalMinutes % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function updatePitstopSelectOptions() {
        const select = document.getElementById('pitstop-target');
        select.innerHTML = '';
        cutoffsData.forEach((co, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = `Po Punkcie #${index + 1} (${co.km} km)`;
            if (index === pitstopTargetIndex) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function renderEditor() {
        const container = document.getElementById('cutoffs-editor-list');
        container.innerHTML = '';
        
        // Sortowanie po dystansie, żeby zachować spójność logiczną
        cutoffsData.sort((a, b) => a.km - b.km);

        cutoffsData.forEach((co, index) => {
            const div = document.createElement('div');
            div.className = 'cutoff-edit-row';
            div.innerHTML = `
                <div style="font-size:0.8rem; font-weight:bold; color:var(--gold); margin-bottom:6px;">PUNKT KONTROLNY #${index + 1}</div>
                <div class="grid-4">
                    <div>
                        <label>Dystans (km)</label>
                        <input type="number" step="0.1" value="${co.km}" onchange="updateCutoff(${index}, 'km', this.value)">
                    </div>
                    <div>
                        <label>Limit (HH:MM)</label>
                        <input type="time" value="${co.time}" onchange="updateCutoff(${index}, 'time', this.value)">
                    </div>
                    <div>
                        <label>Podejście (m)</label>
                        <input type="number" value="${co.gain}" onchange="updateCutoff(${index}, 'gain', this.value)">
                    </div>
                    <div>
                        <label>Zejście (m)</label>
                        <input type="number" value="${co.loss}" onchange="updateCutoff(${index}, 'loss', this.value)">
                    </div>
                </div>
                <button class="btn-danger" onclick="deleteCutoff(${index})">Usuń punkt</button>
            `;
            container.appendChild(div);
        });
        saveActiveProfileState();
    }

    function updateCutoff(index, field, value) {
        if (field === 'km' || field === 'gain' || field === 'loss') {
            cutoffsData[index][field] = parseFloat(value) || 0;
        } else {
            cutoffsData[index][field] = value;
        }
        // Po zmianie dystansu sortujemy bazę, więc indeksy mogą się zmienić - przebudowujemy opcje przepaku
        cutoffsData.sort((a, b) => a.km - b.km);
        updatePitstopSelectOptions();
        renderEditor();
        renderRoute();
    }

    function addCutoffRow() {
        const lastKm = cutoffsData.length > 0 ? cutoffsData[cutoffsData.length - 1].km + 5 : 10;
        cutoffsData.push({ km: lastKm, time: "12:00", gain: 100, loss: 100 });
        updatePitstopSelectOptions();
        renderEditor();
        renderRoute();
    }

    function deleteCutoff(index) {
        cutoffsData.splice(index, 1);
        if (pitstopTargetIndex >= cutoffsData.length && cutoffsData.length > 0) {
            pitstopTargetIndex = cutoffsData.length - 1;
        }
        updatePitstopSelectOptions();
        renderEditor();
        renderRoute();
    }

    function renderRoute() {
        const startTimeStr = document.getElementById('start-time').value;
        const extraDistPct = parseFloat(document.getElementById('extra-dist').value) || 0;
        const strategy = document.querySelector('input[name="pace-strategy"]:checked').value;
        
        const globalMin = parseInt(document.getElementById('global-min').value) || 0;
        const globalSec = parseInt(document.getElementById('global-sec').value) || 0;
        const globalPaceInSeconds = (globalMin * 60) + globalSec;

        const resultsContainer = document.getElementById('route-results');
        resultsContainer.innerHTML = '';

        let currentTimeInMinutes = timeToMinutes(startTimeStr);
        let previousKm = 0;
        let accumGain = 0;
        let accumLoss = 0;

        document.getElementById('global-pitstop-config').style.display = hasPitstop ? 'grid' : 'none';

        cutoffsData.forEach((co, index) => {
            const pId = index + 1; 
            if (!splitPaces[pId]) splitPaces[pId] = 720; 

            const extraModifier = 1 + (extraDistPct / 100);
            const nominalSegmentDist = co.km - previousKm;
            const realSegmentDist = nominalSegmentDist * extraModifier;
            const realTotalKm = co.km * extraModifier;

            accumGain += co.gain;
            accumLoss += co.loss;

            const segmentPaceSeconds = strategy === 'flat' ? globalPaceInSeconds : splitPaces[pId];
            const segmentTimeMinutes = (realSegmentDist * segmentPaceSeconds) / 60;
            
            currentTimeInMinutes += segmentTimeMinutes;

            const cutoffLimitMinutes = timeToMinutes(co.time);
            const diff = cutoffLimitMinutes - currentTimeInMinutes;

            let statusClass = 'safe';
            let statusText = `Zapas: +${Math.floor(diff)} min`;

            if (diff < 0) {
                statusClass = 'danger';
                statusText = `LIMIT PRZEKROCZONY (${Math.abs(Math.floor(diff))} min)`;
            } else if (diff < 30) {
                statusClass = 'passed';
            }

            let html = `
                <div class="card-row" style="border-left-color: ${index === pitstopTargetIndex && hasPitstop ? 'var(--gold)' : 'var(--spartan-purple)'}">
                    <div class="card-header">
                        <span>Punkt #${pId} <span style="color: var(--text-muted); font-size:0.85rem;">(Limit ${co.time})</span></span>
                        <span class="${statusClass}">${statusText}</span>
                    </div>
                    <div class="card-details">
                        <div>Odcinek: <b>${realSegmentDist.toFixed(1)} km</b></div>
                        <div>Suma dystansu: <b>${realTotalKm.toFixed(2)} km</b></div>
                        <div>Odcinek ↑/↓: <b style="color: #ff9100;">+${co.gain}m</b> / <b style="color: #29b6f6;">-${co.loss}m</b></div>
                        <div>Suma ↑/↓: <b style="color: #ff9100;">+${accumGain}m</b> / <b style="color: #29b6f6;">-${accumLoss}m</b></div>
                        <div style="grid-column: span 2; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 4px;">
                            Prognozowane dotarcie: <b style="color: #fff; font-size: 1rem;">${minutesToTimeStr(currentTimeInMinutes)}</b>
                        </div>
                    </div>
            `;

            if (strategy === 'split') {
                const currentMin = Math.floor(splitPaces[pId] / 60);
                const currentSec = splitPaces[pId] % 60;
                
                html += `
                    <div class="pace-input-cell">
                        <label>Tempo na tym odcinku:</label>
                        <div class="flex-pace">
                            <input type="number" class="split-min" data-id="${pId}" value="${currentMin}" min="0">
                            <span style="color: var(--spartan-purple-light)">:</span>
                            <input type="number" class="split-sec" data-id="${pId}" value="${String(currentSec).padStart(2, '0')}" min="0" max="59">
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            resultsContainer.innerHTML += html;

            if (hasPitstop && index === pitstopTargetIndex) {
                const exitTime = currentTimeInMinutes + pitstopDuration;
                
                let pitstopHtml = `
                    <div class="pitstop-box">
                        <div class="card-header" style="color: var(--gold); margin-bottom: 5px; font-size: 1rem;">
                            <span>🔧 Planowany przepak (Drop Bag)</span>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-light);">
                            Czas postoju: <b>${pitstopDuration} min</b>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; border-top: 1px solid rgba(212,175,55,0.1); padding-top: 6px;">
                            Planowane wyjście z przepaku: <b style="color: var(--gold);">${minutesToTimeStr(exitTime)}</b>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML += pitstopHtml;
                currentTimeInMinutes += pitstopDuration;
            }
            
            previousKm = co.km;
        });

        if (strategy === 'split') {
            document.querySelectorAll('.split-min, .split-sec').forEach(input => {
                input.addEventListener('input', function() {
                    const id = this.getAttribute('data-id');
                    const minInput = document.querySelector(`.split-min[data-id="${id}"]`);
                    const secInput = document.querySelector(`.split-sec[data-id="${id}"]`);
                    splitPaces[id] = ((parseInt(minInput.value) || 0) * 60) + (parseInt(secInput.value) || 0);
                    saveActiveProfileState();
                    renderRoute();
                });
            });
        }
        saveActiveProfileState();
    }

    // Dynamiczne event listenery
    document.getElementById('global-pitstop-toggle').addEventListener('change', function() {
        hasPitstop = this.checked;
        renderRoute();
    });

    document.getElementById('global-pitstop-time').addEventListener('input', function() {
        pitstopDuration = parseInt(this.value) || 0;
        renderRoute();
    });

    document.getElementById('pitstop-target').addEventListener('change', function() {
        pitstopTargetIndex = parseInt(this.value) || 0;
        renderRoute();
    });

    document.getElementById('start-time').addEventListener('input', renderRoute);
    document.getElementById('extra-dist').addEventListener('input', renderRoute);
    document.getElementById('global-min').addEventListener('input', renderRoute);
    document.getElementById('global-sec').addEventListener('input', renderRoute);
    
    document.querySelectorAll('input[name="pace-strategy"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('global-pace-container').style.display = this.value === 'flat' ? 'block' : 'none';
            renderRoute();
        });
    });

    // Pełne odpalenie aplikacji na start
    initProfiles();
    updatePitstopSelectOptions();
    renderEditor();
    renderRoute();
</script>

</body>
</html>
