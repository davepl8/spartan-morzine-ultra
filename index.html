<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spartan Ultra Morzine Pace Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght=400;700&family=Roboto:wght=400;500;700&display=swap');

        :root { 
            --spartan-purple: #6a1b9a; /* Charakterystyczny fiolet z grafik Ultra */
            --spartan-purple-light: #9c4dcc;
            --bg-dark: #0f0f12; 
            --card-bg: #1c1b22; 
            --input-bg: #2b2a33;
            --text-light: #ffffff; 
            --text-muted: #a3a3a3;
            --gold: #d4af37; /* Złoto z medalu */
            --safe-green: #00e676;
            --danger-red: #ff1744;
            --warning-orange: #ff9100;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1525 100%); 
            color: var(--text-light); 
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
        }

        .container { 
            max-width: 550px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            border: 2px solid rgba(106, 27, 154, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 15px rgba(106, 27, 154, 0.2); 
        }

        /* Nagłówek w stylu Spartan */
        .header-area {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        h2 { 
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            text-align: center; 
            color: var(--text-light); 
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
        }

        .sub-header {
            font-family: 'Oswald', sans-serif;
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .section { 
            background: rgba(255,255,255,0.02); 
            padding: 18px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .section-title { 
            font-family: 'Oswald', sans-serif;
            font-size: 1rem; 
            color: var(--spartan-purple-light); 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .flex-pace { display: flex; gap: 8px; align-items: center; }
        
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 500; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: var(--input-bg); 
            color: var(--text-light); 
            font-size: 1.1rem; 
            font-weight: bold;
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }
        input:focus, select:focus { 
            border-color: var(--spartan-purple-light); 
            box-shadow: 0 0 8px rgba(156, 77, 204, 0.5);
            outline: none; 
        }
        
        /* Strategia wybór */
        .radio-group { display: flex; gap: 20px; margin-bottom: 5px; }
        .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-light); font-weight: 500; font-size: 0.95rem; }
        .radio-label input { width: auto; margin: 0; accent-color: var(--spartan-purple-light); }

        /* Kafelki punktów kontrolnych */
        .card-row { 
            background: #22212a; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            border-left: 5px solid var(--spartan-purple); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
        }
        .card-row:hover {
            transform: translateX(3px);
        }
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 10px; 
            text-transform: uppercase;
        }
        .card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .card-details b { color: var(--text-light); }
        
        .pace-input-cell { margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
        
        /* Przepak Box */
        .pitstop-box { 
            background: rgba(212, 175, 55, 0.04); 
            border: 1px dashed var(--gold); 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .pitstop-flex { display: flex; align-items: center; gap: 20px; }
        .pitstop-box #pitstop-toggle { accent-color: var(--gold); }

        /* Statusy czasu */
        .safe { color: var(--safe-green); text-shadow: 0 0 4px rgba(0, 230, 118, 0.2); }
        .danger { color: var(--danger-red); text-shadow: 0 0 4px rgba(255, 23, 68, 0.2); }
        .passed { color: var(--warning-orange); text-shadow: 0 0 4px rgba(255, 145, 0, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>Spartan Morzine Ultra</h2>
        <div class="sub-header">Kalkulator tempa</div>
    </div>
    
    <div class="section">
        <div class="section-title">Ustawienia główne</div>
        <div class="grid-2">
            <div>
                <label for="start-time">Godzina startu</label>
                <input type="time" id="start-time" value="07:50">
            </div>
            <div>
                <label for="extra-dist">Dodatkowy dystans (%)</label>
                <input type="number" id="extra-dist" value="10" min="0" max="50">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Strategia tempa</div>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="pace-strategy" value="flat" checked> Stałe tempo
            </label>
            <label class="radio-label">
                <input type="radio" name="pace-strategy" value="split"> Różne tempo
            </label>
        </div>
        
        <div id="global-pace-container" class="pace-input-cell">
            <label>Twoje stałe tempo (min:sek / km)</label>
            <div class="flex-pace">
                <input type="number" id="global-min" value="12" min="0" placeholder="min">
                <span style="font-weight: bold; font-size: 1.2rem; color: var(--spartan-purple-light)">:</span>
                <input type="number" id="global-sec" value="00" min="0" max="59" placeholder="sek">
            </div>
        </div>
    </div>

    <div class="section-title" style="margin-bottom: 15px;">Plan Trasy & Limity</div>
    <div id="route-results"></div>
</div>

<script>
    const cutoffsData = [
        { id: 1, km: 32.0, time: "17:00", gain: 2273, loss: 2273 },
        { id: 2, km: 37.8, time: "18:30", gain: 617, loss: 257 },
        { id: 3, km: 41.3, time: "19:30", gain: 360, loss: 43 },
        { id: 4, km: 46.3, time: "21:00", gain: 137, loss: 744 },
        { id: 5, km: 52.0, time: "22:30", gain: 43, loss: 103 }
    ];

    const splitPaces = { 1: 720, 2: 720, 3: 720, 4: 720, 5: 720 };
    
    let hasPitstop = true;
    let pitstopDuration = 15;

    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function minutesToTimeStr(totalMinutes) {
        const h = Math.floor(totalMinutes / 60) % 24;
        const m = Math.floor(totalMinutes % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function renderRoute() {
        const startTimeStr = document.getElementById('start-time').value;
        const extraDistPct = parseFloat(document.getElementById('extra-dist').value) || 0;
        const strategy = document.querySelector('input[name="pace-strategy"]:checked').value;
        
        const globalMin = parseInt(document.getElementById('global-min').value) || 0;
        const globalSec = parseInt(document.getElementById('global-sec').value) || 0;
        const globalPaceInSeconds = (globalMin * 60) + globalSec;

        const resultsContainer = document.getElementById('route-results');
        resultsContainer.innerHTML = '';

        let currentTimeInMinutes = timeToMinutes(startTimeStr);
        let previousKm = 0;
        let accumGain = 0;
        let accumLoss = 0;

        cutoffsData.forEach((co, index) => {
            const extraModifier = 1 + (extraDistPct / 100);
            const nominalSegmentDist = co.km - previousKm;
            const realSegmentDist = nominalSegmentDist * extraModifier;
            const realTotalKm = co.km * extraModifier;

            accumGain += co.gain;
            accumLoss += co.loss;

            const segmentPaceSeconds = strategy === 'flat' ? globalPaceInSeconds : splitPaces[co.id];
            const segmentTimeMinutes = (realSegmentDist * segmentPaceSeconds) / 60;
            
            currentTimeInMinutes += segmentTimeMinutes;

            const cutoffLimitMinutes = timeToMinutes(co.time);
            const diff = cutoffLimitMinutes - currentTimeInMinutes;

            let statusClass = 'safe';
            let statusText = `Zapas: +${Math.floor(diff)} min`;

            if (diff < 0) {
                statusClass = 'danger';
                statusText = `LIMIT PRZEKROCZONY (${Math.abs(Math.floor(diff))} min)`;
            } else if (diff < 30) {
                statusClass = 'passed';
            }

            let html = `
                <div class="card-row" style="border-left-color: ${co.id === 1 ? 'var(--gold)' : 'var(--spartan-purple)'}">
                    <div class="card-header">
                        <span>Punkt #${co.id} <span style="color: var(--text-muted); font-size:0.85rem;">(Limit ${co.time})</span></span>
                        <span class="${statusClass}">${statusText}</span>
                    </div>
                    <div class="card-details">
                        <div>Dystans sekcji: <b>${realSegmentDist.toFixed(1)} km</b></div>
                        <div>Suma dystansu: <b>${realTotalKm.toFixed(2)} km</b></div>
                        <div>Sekcja ↑/↓: <b style="color: #ff9100;">+${co.gain}m</b> / <b style="color: #29b6f6;">-${co.loss}m</b></div>
                        <div>Suma ↑/↓: <b style="color: #ff9100;">+${accumGain}m</b> / <b style="color: #29b6f6;">-${accumLoss}m</b></div>
                        <div style="grid-column: span 2; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 4px;">
                            Prognozowany czas wejścia: <b style="color: #fff; font-size: 1rem;">${minutesToTimeStr(currentTimeInMinutes)}</b>
                        </div>
                    </div>
            `;

            if (strategy === 'split') {
                const currentMin = Math.floor(splitPaces[co.id] / 60);
                const currentSec = splitPaces[co.id] % 60;
                
                html += `
                    <div class="pace-input-cell">
                        <label>Tempo na tym odcinku:</label>
                        <div class="flex-pace">
                            <input type="number" class="split-min" data-id="${co.id}" value="${currentMin}" min="0">
                            <span style="color: var(--spartan-purple-light)">:</span>
                            <input type="number" class="split-sec" data-id="${co.id}" value="${String(currentSec).padStart(2, '0')}" min="0" max="59">
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            resultsContainer.innerHTML += html;

            if (co.id === 1) {
                const exitTime = currentTimeInMinutes + (hasPitstop ? pitstopDuration : 0);
                
                let pitstopHtml = `
                    <div class="pitstop-box">
                        <div class="card-header" style="color: var(--gold); margin-bottom: 5px; font-size: 1rem;">
                            <span>🔧 Przepak (Po Punkcie #1)</span>
                        </div>
                        <div class="pitstop-flex">
                            <label class="radio-label" style="margin: 0;">
                                <input type="checkbox" id="pitstop-toggle" ${hasPitstop ? 'checked' : ''}> Planuję przerwę
                            </label>
                            <div id="pitstop-input-wrap" style="display: ${hasPitstop ? 'block' : 'none'}; flex-grow: 1;">
                                <div class="flex-pace">
                                    <input type="number" id="pitstop-time" value="${pitstopDuration}" min="0" style="padding: 8px; text-align: center;">
                                    <span style="font-size: 0.85rem; color: var(--text-muted)">min</span>
                                </div>
                            </div>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; border-top: 1px solid rgba(212,175,55,0.1); padding-top: 6px;">
                            Prognozowane wyjście z przepaku: <b style="color: var(--gold);">${minutesToTimeStr(exitTime)}</b>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML += pitstopHtml;
                
                if (hasPitstop) {
                    currentTimeInMinutes += pitstopDuration;
                }
            }
            
            previousKm = co.km;
        });

        if (strategy === 'split') {
            document.querySelectorAll('.split-min, .split-sec').forEach(input => {
                input.addEventListener('input', function() {
                    const id = this.getAttribute('data-id');
                    const minInput = document.querySelector(`.split-min[data-id="${id}"]`);
                    const secInput = document.querySelector(`.split-sec[data-id="${id}"]`);
                    splitPaces[id] = ((parseInt(minInput.value) || 0) * 60) + (parseInt(secInput.value) || 0);
                    renderRoute();
                });
            });
        }

        const toggle = document.getElementById('pitstop-toggle');
        if (toggle) {
            toggle.addEventListener('change', function() {
                hasPitstop = this.checked;
                renderRoute();
            });
        }

        const pTime = document.getElementById('pitstop-time');
        if (pTime) {
            pTime.addEventListener('input', function() {
                pitstopDuration = parseInt(this.value) || 0;
                renderRoute();
            });
        }
    }

    document.getElementById('start-time').addEventListener('input', renderRoute);
    document.getElementById('extra-dist').addEventListener('input', renderRoute);
    document.getElementById('global-min').addEventListener('input', renderRoute);
    document.getElementById('global-sec').addEventListener('input', renderRoute);
    
    document.querySelectorAll('input[name="pace-strategy"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('global-pace-container').style.display = this.value === 'flat' ? 'block' : 'none';
            renderRoute();
        });
    });

    renderRoute();
</script>

</body>
</html>
